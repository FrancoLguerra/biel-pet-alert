<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle de Publicación</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">

        <!-- Imagen -->
        <img th:if="${publication.image != null}"
             th:src="@{/publications/image/{id}(id=${publication.id})}"
             class="card-img-top"
             style="max-height:400px; object-fit:cover;">

        <div class="card-body">

            <!-- Tipo -->
            <span class="badge bg-danger"
                  th:if="${publication.type.name() == 'LOST'}">
                Perdido
            </span>

            <span class="badge bg-success"
                  th:if="${publication.type.name() == 'FOUND'}">
                Encontrado
            </span>

            <span class="badge bg-warning text-dark"
                  th:if="${publication.type.name() == 'ADOPTION'}">
                En adopción
            </span>

            <!-- Nombre -->
            <h2 class="mt-3" th:text="${publication.petName}"></h2>

            <hr>

            <!-- Info -->
            <p><strong>Especie:</strong> <span th:text="${publication.species}"></span></p>
            <p><strong>Raza:</strong> <span th:text="${publication.breed}"></span></p>
            <p><strong>Color:</strong> <span th:text="${publication.color}"></span></p>
            <p><strong>Barrio:</strong> <span th:text="${publication.neighborhood}"></span></p>

            <p><strong>Ubicación:</strong> <span th:text="${publication.location}"></span></p>
                <iframe
                            width="100%"
                            height="300"
                            style="border:0;"
                            allowfullscreen
                            th:src="'https://www.google.com/maps?q=' + ${publication.latitude} + ',' + ${publication.longitude} + '&output=embed'">
                        </iframe>

            <p><strong>Descripción:</strong></p>
            <p th:text="${publication.description}"></p>

            <p><strong>Contacto:</strong> <span th:text="${publication.contactPhone}"></span></p>

            <p class="text-muted">
                Publicado el:
                <span th:text="${#temporals.format(publication.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
            </p>

            <!-- Botones -->
            <div class="mt-4">
                <a th:href="@{/publications}" class="btn btn-secondary">
                    Volver
                </a>

                <a th:href="@{/publications/put/{id}(id=${publication.id})}"
                   class="btn btn-warning">
                    Editar
                </a>

                <a th:href="@{/publications/delete/{id}(id=${publication.id})}"
                   class="btn btn-danger"
                   onclick="return confirm('¿Seguro que querés eliminar esta publicación?')">
                    Eliminar
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
