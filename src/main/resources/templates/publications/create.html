<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Publicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body class="bg-light">
    <h1>Estoy en create</h1>

<div class="container mt-4">
    <h2>Nueva Publicación</h2>

    <form th:action="@{/publications}" th:object="${publication}" method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label>Tipo</label>
            <select class="form-control" th:field="*{type}">
                <option value="LOST">Perdido</option>
                <option value="FOUND">Encontrado</option>
                <option value="ADOPTION">Adopción</option>
            </select>
        </div>
        <div>
            <label>Status</label>
            <select class="form-control" th:field="*{status}">
                <option value="ACTIVE">Activo</option>
                <option value="INACTIVE">Inactivo</option>
            </select>
        </div>
        

        <div class="mb-3">
            <label>Nombre de la mascota</label>
            <input type="text" class="form-control" th:field="*{petName}">
        </div>

        <div class="mb-3">
            <label>Especie</label>
            <select class="form-control" th:field="*{species}">
                <option value="Perro">Perro</option>
                <option value="Gato">Gato</option>
                <option value="Pájaro">Pájaro</option>
                <option value="Roedor">Roedor</option>
                <option value="Otro">Otro</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Raza</label>
            <input type="text" class="form-control" th:field="*{breed}">
        </div>

        <div class="mb-3">
            <label>Color</label>
            <input type="text" class="form-control" th:field="*{color}">
        </div>

        <div class="mb-3">
            <label>Barrio</label>
            <input type="text" class="form-control" th:field="*{neighborhood}">
            <input type="hidden" th:field="*{latitude}" id="latitude">
            <input type="hidden" th:field="*{longitude}" id="longitude">
        </div>

        <div class="mb-3">
            <label>Ubicación en el mapa</label>
            <div id="map" style="height: 300px;"></div>
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
        </div>

        <div class="mb-3">
            <label>Imagen</label>
            <input type="file" class="form-control" name="imageFile">
        </div>

        <div class="mb-3">
            <label>Teléfono de contacto</label>
            <input type="text" class="form-control" th:field="*{contactPhone}">
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
        <a th:href="@{/publications}" class="btn btn-secondary">Cancelar</a>

    </form>
</div>

</body>
<script>
    var map = L.map('map').setView([-37.3217, -59.1332], 13); // Tandil aprox

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var marker;

    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        if (marker) {
            map.removeLayer(marker);
        }

        marker = L.marker([lat, lng]).addTo(map);

        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lng;
    });
</script>
</html>
